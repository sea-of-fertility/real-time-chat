services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-chat}
      POSTGRES_USER: ${DB_USERNAME:-chat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chat} -d ${DB_NAME:-chat}"]
      interval: 5s
      timeout: 3s
      retries: 5

  stable:
    image: ghcr.io/sea-of-fertility/real-time-chat:latest
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-chat}
      DB_USERNAME: ${DB_USERNAME:-chat}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  canary:
    image: ghcr.io/sea-of-fertility/real-time-chat:latest
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-chat}
      DB_USERNAME: ${DB_USERNAME:-chat}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - canary

  blue:
    image: ghcr.io/sea-of-fertility/real-time-chat:latest
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-chat}
      DB_USERNAME: ${DB_USERNAME:-chat}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - bluegreen

  green:
    image: ghcr.io/sea-of-fertility/real-time-chat:latest
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-chat}
      DB_USERNAME: ${DB_USERNAME:-chat}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - bluegreen

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stable

volumes:
  pgdata:
